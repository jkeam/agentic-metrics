{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}
{% block header %}
  <div class="pf-v6-c-content">
    <h1>Dashboard</h1>
    <p>Important metrics below.</p>
  </div>
{% endblock %}

{% block content %}
  <div class="pf-v6-l-gallery pf-m-gutter">
    <!-- card -->
    <div class="pf-v6-c-card">
        <div class="pf-v6-c-card__header">
            <div class="pf-v6-c-card__title">
                <div class="pf-v6-c-card__title-text">Network Traffic</div>
            </div>
            <!--
            <div class="pf-v6-c-card__actions">
                <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="More actions">
                    <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
                </button>
            </div>
            -->
        </div>
        <div class="pf-v6-c-card__body">
            <div class="chart-placeholder">
                {{ chart }}
            </div>
        </div>
        <div class="pf-v6-c-card__footer">
            <a href="#">View detailed report</a>
        </div>
    </div>
  </div>
{% endblock %}
