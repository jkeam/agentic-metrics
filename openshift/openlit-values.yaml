additionalLabels: {}
affinity: {}
clickhouse:
  auth:
    password: OPENLIT
    secret:
      name: ''
      passwordKey: ''
      usernameKey: ''
    user: default
  enabled: true
  image:
    pullPolicy: IfNotPresent
    repository: clickhouse/clickhouse-server
    tag: 24.2.2
  persistence:
    accessMode: ReadWriteOnce
    size: 10Gi
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  service:
    type: ClusterIP
config:
  database:
    host: openlit-db.default.svc.cluster.local
    name: openlit
    password: OPENLIT
    port: '8123'
    username: default
  opamp:
    environment: production
    logLevel: info
    tlsInsecureSkipVerify: true
    tlsMaxVersion: '1.3'
    tlsMinVersion: '1.2'
    tlsRequireClientCert: false
  preview_mode:
    account_email: user@openlit.io
    account_password: openlituser
    enabled: false
  sqlite_url: 'file:/app/client/data/data.db'
  usageMetrics: true
fullnameOverride: ''
image:
  pullPolicy: IfNotPresent
  repository: ghcr.io/openlit/openlit
  tag: '1.17.3'
imagePullSecrets: []
ingress:
  annotations: {}
  className: nginx
  enabled: false
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - hosts:
        - chart-example.local
      secretName: chart-example-tls
nameOverride: ''
nodeSelector: {}
openlit-operator:
  enabled: false
persistence:
  accessMode: ReadWriteOnce
  enabled: true
  size: 5Gi
podAnnotations: {}
replicaCount: 1
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi
service:
  annotations: {}
  port: 3000
  sessionAffinity: None
  target_port: 3000
  type: LoadBalancer
tolerations: []

